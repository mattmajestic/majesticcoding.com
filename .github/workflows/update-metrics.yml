name: Update @majesticcoding Youtube Channel Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run_notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v2

      - name: Set Up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x 

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt  # Install your notebook dependencies

      - name: Run Jupyter Notebook
        run: |
          jupyter nbconvert --execute --to html majesticcoding-Youtube-Channel.ipynb --output=docs/index.html
        continue-on-error: true

      - name: Commit and Push HTML Output
        uses: EndBug/add-and-commit@v9
        with:
          add: 'docs/index.html'  # Specify the path to your HTML file
          author_name: 'GitHub Actions'
          author_email: 'actions@github.com'
          commit: '--signoff'
          message: 'Update index.html'
          committer_name: 'GitHub Actions'
          committer_email: 'actions@github.com'
          default_author: 'github_actor'
          branch: 'gh-pages'  # Specify the target branch as gh-pages
          fetch: false
          push: true
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
